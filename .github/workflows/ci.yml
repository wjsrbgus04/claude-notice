name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # engines: node >= 18 — 최소 지원 버전과 최신 LTS에서 검증
        node: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax check (JS)
        run: |
          node --check bin/cli.mjs
          node --check lib/bot.mjs

      - name: Syntax check (shell)
        run: bash -n lib/notify.sh

      - name: CLI smoke test (help)
        run: node bin/cli.mjs

      - name: Package contents check
        run: npm pack --dry-run
